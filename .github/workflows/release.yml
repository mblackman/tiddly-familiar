name: Release

on:
    push:
        tags:
            - "v*"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    IMAGE: ghcr.io/mblackman/tiddly-familiar

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Build plugin
              run: node scripts/build-plugin.js

            - name: Verify plugin.info version matches tag
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PLUGIN_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./plugins/mblackman/familiar/plugin.info', 'utf8')).version")
                  echo "Tag version:    $TAG"
                  echo "Plugin version: $PLUGIN_VERSION"
                  if [ "$TAG" != "$PLUGIN_VERSION" ]; then
                      echo "::error::Tag $GITHUB_REF_NAME does not match plugin.info version $PLUGIN_VERSION"
                      exit 1
                  fi

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.release
                  push: true
                  tags: |
                      ${{ env.IMAGE }}:${{ github.ref_name }}
                      ${{ env.IMAGE }}:latest

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: build/familiar.tid
                  generate_release_notes: true
                  fail_on_unmatched_files: true
